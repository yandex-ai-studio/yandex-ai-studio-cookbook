<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>
    (function () {
        'use strict';

        const TITLE = 'Yandex Cloud AI';
        const GREETING = 'Привет! Это AI‑агент по документации Yandex Cloud. Задайте вопрос ниже.';

        function detectEnv() {
            const isColab = (typeof google !== 'undefined' && google.colab && google.colab.kernel);
            const isClassic =
                (typeof IPython !== 'undefined' &&
                    IPython.notebook &&
                    IPython.notebook.kernel &&
                    typeof IPython.notebook.kernel.execute === 'function');
            return { isColab, isClassic };
        }

        function normalizeSources(sources) {
            if (!Array.isArray(sources)) return [];
            return sources
                .filter(s => s && typeof s === 'object')
                .map(s => ({
                    title: String(s.title || '').trim() || 'Источник',
                    url: String(s.url || '').trim()
                }))
                .filter(s => !!s.url);
        }

        // -------- Markdown -> HTML (с поддержкой переносов) --------
        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function renderMarkdown(md) {
            const raw = String(md ?? "");

            // marked: markdown -> html
            const html = marked.parse(raw, {
                gfm: true,
                breaks: true,
                mangle: false,
                headerIds: false,
            });

            // DOMPurify: режем XSS, но оставляем ссылки/форматирование
            const clean = DOMPurify.sanitize(html, {
                USE_PROFILES: { html: true },
                ADD_ATTR: ["target", "rel"],
            });

            // Гарантируем, что все ссылки открываются в новой вкладке
            // (DOMPurify оставит атрибуты, но лучше проставить явно после sanitize)
            const wrapper = document.createElement("div");
            wrapper.innerHTML = clean;
            wrapper.querySelectorAll("a").forEach(a => {
                a.target = "_blank";
                a.rel = "noopener noreferrer";
            });
            return wrapper.innerHTML;
        }


        // -------- parsing result from Python (JSON or python-repr) --------
        function tryParseResult(data) {
            if (data && typeof data === "object") return data;

            const s = String(data ?? "").trim();
            if (!s) return { answer: "", sources: [] };

            // 1) JSON
            try {
                const obj = JSON.parse(s);

                // если это строка, которая сама содержит JSON — парсим ещё раз
                if (typeof obj === "string") {
                    try { return JSON.parse(obj); } catch (e) { return { obj, sources: [] }; }
                }
                return obj;
            } catch (e) { }

            // 2) python dict repr fallback (как у тебя)
            try {
                let t = s
                    .replace(/\bNone\b/g, "null")
                    .replace(/\bTrue\b/g, "true")
                    .replace(/\bFalse\b/g, "false")
                    .replace(/'/g, '"');
                return JSON.parse(t);
            } catch (e) { }

            return { answer: s, sources: [] };
        }


        // -------- JS -> Python --------
        async function callPythonAgent(payload) {
            const env = detectEnv();

            if (typeof payload === 'string') {
                payload = { query: payload, save_to_s3: false };
            }
            payload = payload || {};
            payload.query = String(payload.query || '').trim();
            payload.save_to_s3 = !!payload.save_to_s3;

            if (!payload.query) throw new Error('Пустой запрос.');

            if (env.isColab) {
                const name = 'yc_agent_callback';

                const timeoutMs = 60000;
                const timeout = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Timeout 60s')), timeoutMs);
                });

                const call = async () => {
                    // ВАЖНО: args должны быть массивом
                    const res = await google.colab.kernel.invokeFunction(name, [payload], {});
                    const data = (res && res.data && (res.data['application/json'] ?? res.data['text/plain'])) ?? res;
                    return tryParseResult(data);
                };

                return await Promise.race([call(), timeout]);
            }

            if (env.isClassic) {
                const callbackId = 'ycwcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
                const payloadJson = JSON.stringify(payload);
                const payloadB64 = btoa(unescape(encodeURIComponent(payloadJson)));

                const py = `
import json, base64
from IPython.display import Javascript, display

def ycw_emit(obj):
    js = "if(window.${callbackId}) window.${callbackId}(" + json.dumps(obj, ensure_ascii=False, default=str) + ");"
    display(Javascript(js))

try:
    if 'agent_callback' not in globals():
        ycw_emit({"answer": "agent_callback не найден. Зарегистрируйте callback в Python.", "sources": []})
    else:
        payload_json = base64.b64decode("${payloadB64}").decode("utf-8")
        payload = json.loads(payload_json)
        result = agent_callback(payload)
        # может вернуться dict или строка; отдадим как есть
        ycw_emit(result)
except Exception as e:
    ycw_emit({"answer": str(e), "sources": []})
`;

                return new Promise((resolve, reject) => {
                    let done = false;
                    const timer = setTimeout(() => {
                        if (done) return;
                        done = true;
                        try { delete window[callbackId]; } catch (e) { }
                        reject(new Error('Timeout 60s'));
                    }, 60000);

                    window[callbackId] = (result) => {
                        if (done) return;
                        done = true;
                        clearTimeout(timer);
                        try { delete window[callbackId]; } catch (e) { }
                        resolve(tryParseResult(result));
                    };

                    try {
                        IPython.notebook.kernel.execute(py, { iopub: { output: () => { } }, shell: { reply: () => { } } }, { silent: false });
                    } catch (e) {
                        clearTimeout(timer);
                        try { delete window[callbackId]; } catch (e2) { }
                        reject(e);
                    }
                });
            }

            throw new Error('Среда не поддерживается: нужен Colab или Classic Jupyter Notebook.');
        }

        // -------- UI --------
        function createWidget(root) {
            root.innerHTML = `
        <button class="ycw-launcher" type="button" aria-label="Open chat">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
          </svg>
        </button>

        <div class="ycw-window" data-open="false" role="dialog" aria-label="Yandex Cloud chat">
          <div class="ycw-header">
            <div class="ycw-brand">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="11" fill="#5282FF" opacity="0.2"/>
                <path d="M12 3C7.03 3 3 7.03 3 12C3 16.97 7.03 21 12 21C16.97 21 21 16.97 21 12C21 7.03 16.97 3 12 3ZM12 19C8.13 19 5 15.87 5 12C5 8.13 8.13 5 12 5C15.87 5 19 8.13 19 12C19 15.87 15.87 19 12 19Z" fill="#5282FF"/>
                <path d="M14 8.5L10 12L14 15.5V8.5Z" fill="#5282FF"/>
              </svg>
              <div class="ycw-title">${TITLE}</div>
            </div>
            <button class="ycw-close" type="button" aria-label="Close">×</button>
          </div>

          <div class="ycw-messages"></div>

          <div class="ycw-inputbar">
            <input class="ycw-input" type="text" placeholder="Напишите вопрос..." autocomplete="off"/>
            <label class="ycw-save-wrap" title="Сохранить результат запроса в Object Storage (S3)">
              <input class="ycw-save-s3" type="checkbox"/>
              Save to S3
            </label>
            <button class="ycw-send" type="button">Send</button>
          </div>
        </div>
      `;

            const launcher = root.querySelector('.ycw-launcher');
            const windowEl = root.querySelector('.ycw-window');
            const closeBtn = root.querySelector('.ycw-close');
            const messagesEl = root.querySelector('.ycw-messages');
            const inputEl = root.querySelector('.ycw-input');
            const sendBtn = root.querySelector('.ycw-send');
            const saveS3El = root.querySelector('.ycw-save-s3');

            let loadingEl = null;
            let progressTimer = null;

            function scrollBottom() {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            function addMessage(text, who) {
                const div = document.createElement('div');
                div.className = 'ycw-msg ' + (who === 'user' ? 'ycw-msg--user' : 'ycw-msg--bot');

                if (who === 'bot') div.innerHTML = renderMarkdown(text);
                else div.textContent = String(text);

                messagesEl.appendChild(div);
                scrollBottom();
                return div;
            }

            function setOpen(open) {
                windowEl.dataset.open = open ? 'true' : 'false';
                if (open) setTimeout(() => inputEl.focus(), 0);
            }

            function setLoading(on) {
                if (!on) {
                    if (progressTimer) clearInterval(progressTimer);
                    progressTimer = null;
                    if (loadingEl) loadingEl.remove();
                    loadingEl = null;
                    return;
                }

                loadingEl = document.createElement('div');
                loadingEl.className = 'ycw-msg ycw-loading ycw-msg--bot';
                loadingEl.innerHTML = `
          <div class="ycw-loading__row">
            <span class="ycw-spinner" aria-hidden="true"></span>
            <span class="ycw-loading__text">Ищу информацию…</span>
          </div>
          <div class="ycw-progress"><div class="ycw-progress__fill"></div></div>
        `;
                messagesEl.appendChild(loadingEl);
                scrollBottom();

                const steps = [
                    { p: 20, t: 'Ищу информацию…' },
                    { p: 45, t: 'Читаю результаты…' },
                    { p: 65, t: 'Формирую ответ…' },
                    { p: 85, t: 'Почти готово…' },
                    { p: 95, t: 'Готовлю ответ' },
                ];
                let i = 0;

                const fill = loadingEl.querySelector('.ycw-progress__fill');
                const txt = loadingEl.querySelector('.ycw-loading__text');

                progressTimer = setInterval(() => {
                    const step = steps[Math.min(i, steps.length - 1)];
                    if (fill) fill.style.width = step.p + '%';
                    if (txt) txt.textContent = step.t;
                    i += 1;
                    if (i > steps.length + 2) {
                        clearInterval(progressTimer);
                        progressTimer = null;
                    }
                }, 600);
            }

            function buildAnswerMarkdown(result) {
                const defaultText = "Пустой ответ. Уточните запрос или попробуйте ещё раз.";

                if (typeof result === "string") {
                    const s = result.trim();
                    return s ? s : defaultText;
                }

                const answer = (result && result.answer != null) ? String(result.answer).trim() : "";
                const sources = Array.isArray(result?.sources) ? result.sources : [];

                const links = sources
                    .map(s => {
                        const title = String(s?.title ?? "Источник").trim();
                        const url = String(s?.url ?? "").trim();
                        return url ? `[${title}](${url})` : null;
                    })
                    .filter(Boolean);

                let md = answer || defaultText;
                if (links.length) md += `\n\nПодробнее: ${links.join(", ")}`;

                return md.trim();
            }


            async function send() {
                const q = inputEl.value.trim();
                if (!q || sendBtn.disabled) return;

                addMessage(q, 'user');
                inputEl.value = '';

                sendBtn.disabled = true;
                setLoading(true);

                try {
                    const payload = { query: q, save_to_s3: !!(saveS3El && saveS3El.checked) };
                    const raw = await callPythonAgent(payload);
                    const resultObj = tryParseResult(raw);
                    const md = buildAnswerMarkdown(resultObj);
                    addMessage(md, "bot");

                    setLoading(false);

                } catch (e) {
                    setLoading(false);
                    addMessage(e && e.message ? e.message : String(e), 'bot');
                } finally {
                    sendBtn.disabled = false;
                    inputEl.focus();
                }
            }

            launcher.addEventListener('click', () => setOpen(windowEl.dataset.open !== 'true'));
            closeBtn.addEventListener('click', () => setOpen(false));
            sendBtn.addEventListener('click', send);
            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') send();
                if (e.key === 'Escape') setOpen(false);
            });

            const env = detectEnv();
            let extra = '';
            if (!env.isColab && !env.isClassic) extra = '\n\n(Виджет работает в Colab или Classic Jupyter Notebook.)';
            else if (env.isColab) extra = '\n\n(Подключено через Colab callback.)';
            else extra = '\n\n(Подключено через IPython.notebook.kernel.execute.)';

            addMessage(GREETING + extra, 'bot');
        }

        const root = document.getElementById('ycw-root');
        if (root) createWidget(root);
        else console.error('ycw-root not found');
    })();
</script>
</div>
